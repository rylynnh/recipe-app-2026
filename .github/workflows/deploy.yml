name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        continue-on-error: true
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Configure Tencent Cloud COS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.TENCENT_SECRET_ID }}
          aws-secret-access-key: ${{ secrets.TENCENT_SECRET_KEY }}
          aws-region: ${{ secrets.TENCENT_COS_REGION }}

      - name: Deploy to Tencent Cloud COS
        env:
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
        run: |
          aws s3 sync dist/ "s3://${TENCENT_COS_BUCKET}" \
            --endpoint-url "https://cos.${TENCENT_COS_REGION}.myqcloud.com" \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${TENCENT_COS_BUCKET}/index.html" \
            --endpoint-url "https://cos.${TENCENT_COS_REGION}.myqcloud.com" \
            --cache-control "no-cache"